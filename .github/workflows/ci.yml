```yaml
name: CI - Validate K8s Manifests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Kubernetes YAML files
        run: |
          echo "Validating Kubernetes manifests..."

          for file in $(find k8s -name "*.yaml"); do
            echo "Checking $file"

            python3 -c "
import yaml
with open('$file', 'r') as f:
    list(yaml.safe_load_all(f))
print('✅ Valid:', '$file')
"
          done

          echo "✅ All Kubernetes manifests are valid."

      - name: Check Terraform files exist
        run: |
          echo "Checking Terraform files..."

          ls terraform/*.tf

          echo "✅ All Terraform files are present."
```
