name: CI - Validate K8s Manifests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          find k8s/ -name "*.yaml" | while read file; do
            python3 -c "import yaml,sys; list(yaml.safe_load_all(open('$file'))) and print('OK: $file')" || exit 1
          done
          echo "All manifests valid!"
      - name: Check Terraform files
        run: |
          ls terraform/*.tf
          echo "All Terraform files present!"
