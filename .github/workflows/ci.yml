- name: Validate K8s manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/configmap.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/backend-deployment.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/backend-service.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/frontend-deployment.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/frontend-service.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/ingress.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/hpa.yaml
          echo "All manifests valid!"
